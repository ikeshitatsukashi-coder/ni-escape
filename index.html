<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#05070f;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,sans-serif;color:#eaf2ff;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #stage{position:fixed;inset:0;overflow:hidden}
  .bg{position:absolute;inset:0;background:#05070f center/cover no-repeat;filter:saturate(1.06) brightness(.95);opacity:0;transition:opacity .45s}
  .bg.on{opacity:1}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(125% 100% at 50% 38%,transparent 48%,rgba(2,4,10,.62));z-index:2}

  #hero{position:absolute;z-index:5;left:50%}
  #hero img{width:100%;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55)) drop-shadow(0 0 16px rgba(47,242,208,.16))}
  #hsh{position:absolute;z-index:4;border-radius:50%;background:radial-gradient(closest-side,rgba(0,0,0,.55),transparent)}
  #tag{position:absolute;z-index:6;background:rgba(8,14,32,.72);border:1px solid rgba(126,249,230,.45);color:#bdfff4;
    font-size:12px;font-weight:700;padding:3px 10px;border-radius:18px;white-space:nowrap;left:50%;transform:translateX(-50%)}

  /* floor hotspot */
  .spot{position:absolute;z-index:3;width:74px;height:30px;transform:translate(-50%,50%);pointer-events:none}
  .spot .ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(47,242,208,.8);
    box-shadow:0 0 18px rgba(47,242,208,.6);animation:rp 1.6s infinite}
  .spot .pin{position:absolute;left:50%;bottom:120%;transform:translateX(-50%);color:#bdfff4;font-size:18px;
    text-shadow:0 0 10px rgba(47,242,208,.8);animation:bobp 1.4s infinite}
  .spot.done .ring{border-color:rgba(125,255,176,.7);box-shadow:0 0 14px rgba(125,255,176,.5);animation:none}
  @keyframes rp{0%{transform:scale(.7);opacity:1}100%{transform:scale(1.25);opacity:0}}
  @keyframes bobp{50%{transform:translateX(-50%) translateY(-5px)}}

  /* doors */
  .doorp{position:absolute;top:40%;left:50%;transform:translateX(-50%);z-index:8;white-space:nowrap;
    background:rgba(8,30,24,.7);border:1px solid rgba(125,255,176,.6);color:#bfffd9;font-weight:800;font-size:14px;
    padding:8px 16px;border-radius:22px;box-shadow:0 0 22px rgba(47,242,208,.5);opacity:0;transition:opacity .3s}
  .doorp.show{opacity:1;animation:bobup 1.3s infinite}
  @keyframes bobup{50%{transform:translateX(-50%) translateY(-5px)}}
  #win{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,#103b34,#04060e);text-align:center;gap:8px;padding:20px}
  #win h1{font-size:44px;color:#7dffb0;text-shadow:0 0 26px rgba(125,255,176,.55);letter-spacing:.06em}
  #win p{color:#bcd}
  #win button{margin-top:14px;cursor:pointer;background:linear-gradient(180deg,#2ff2d0,#159e85);border:none;border-radius:30px;
    padding:13px 34px;color:#04241d;font-weight:800;font-size:16px}

  .pan{position:absolute;background:rgba(10,17,36,.62);backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);
    border:1px solid rgba(126,200,255,.2);border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:10}
  .logo{top:16px;left:18px;font-weight:800;letter-spacing:.13em;font-size:clamp(15px,1.5vw,18px);position:absolute;z-index:10;text-shadow:0 2px 10px rgba(0,0,0,.7)}
  .logo b{color:#2ff2d0}
  .timer{top:14px;right:148px;padding:7px 14px;font-weight:800;font-size:clamp(14px,1.4vw,18px);color:#ffd86a;font-variant-numeric:tabular-nums}
  .timer small{display:block;font-size:9px;letter-spacing:.18em;color:#9fb0d0}
  .eb{top:14px;right:18px;cursor:pointer;background:linear-gradient(180deg,#ff4d7e,#d11d52);border:none;border-radius:13px;
    padding:11px 15px;color:#fff;font-weight:800;font-size:14px;position:absolute;z-index:10}
  .eb:active{transform:scale(.96)}
  .obj{top:80px;left:18px;padding:11px 15px;font-size:13px;font-weight:700}
  .obj b{color:#7fe9d6;font-size:9px;letter-spacing:.2em;display:block;font-weight:800;margin-bottom:3px}
  .here{top:80px;right:18px;padding:9px 14px;font-size:12px;letter-spacing:.14em;color:#bcd6f5}

  /* minimap */
  .map{bottom:16px;left:18px;width:208px;height:74px;padding:0;overflow:hidden}
  .map svg{width:100%;height:100%;display:block}

  /* interact prompt */
  .ipr{bottom:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:9px;padding:10px 16px;font-size:14px;
    opacity:0;transition:opacity .2s;z-index:11}
  .ipr.show{opacity:1}
  .kbd{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:6px;padding:2px 8px;font-weight:800;font-size:13px}

  /* task modal */
  #modal{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(2,5,12,.55)}
  .card{width:min(86vw,330px);padding:20px;background:rgba(12,20,42,.92);border:1px solid rgba(126,200,255,.3);
    border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
  .card h4{font-size:12px;letter-spacing:.2em;color:#ff9ec6;font-weight:800;margin-bottom:12px}
  .read{font-family:ui-monospace,monospace;font-size:30px;letter-spacing:.3em;color:#bdfff4;text-align:center;
    background:#05131a;border:1px solid rgba(47,242,208,.32);border-radius:10px;padding:9px 0;margin-bottom:14px;text-shadow:0 0 12px rgba(47,242,208,.5)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .key{aspect-ratio:1.5/1;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;
    font-weight:800;color:#dbe6fb;background:linear-gradient(180deg,#1a2748,#10192f);border:1px solid rgba(126,200,255,.2)}
  .key:active{transform:scale(.94)} .key.ok{background:linear-gradient(180deg,#2ff2d0,#159e85);color:#04241d;border-color:transparent}
  .act{width:100%;cursor:pointer;background:linear-gradient(180deg,#2ff2d0,#159e85);border:none;border-radius:12px;padding:15px;
    color:#04241d;font-weight:800;font-size:16px;margin-top:6px}
  .act:active{transform:scale(.97)} .act:disabled{opacity:.5}
  .pbar{height:9px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden;margin-top:14px;display:none}
  .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#2ff2d0,#1ea3ff)}
  .x{position:absolute;top:14px;right:18px;cursor:pointer;color:#9fb0d0;font-size:22px;z-index:21}

  #toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:25;background:rgba(8,30,24,.92);
    border:1px solid rgba(125,255,176,.5);color:#bfffd9;font-weight:800;padding:14px 24px;border-radius:14px;
    font-size:16px;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
  #toast.show{opacity:1}
  .hint{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:11px;color:#7e93b8;z-index:11}
  #start{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(circle at 50% 35%,#142747,#070b18 70%);text-align:center;padding:24px}
  #start h1{font-size:46px;letter-spacing:.1em;color:#eaf2ff;text-shadow:0 3px 0 #19324a}
  #start h1 b{color:#2ff2d0}
  #start>p{color:#9fb6d8;font-size:14px;margin-top:-6px}
  .sgrp{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
  .slbl{font-size:11px;letter-spacing:.22em;color:#7fe9d6;font-weight:800;width:70px;text-align:right}
  .sopts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .sopt{cursor:pointer;background:rgba(12,20,42,.7);border:1px solid rgba(126,200,255,.25);color:#cfe0ff;border-radius:11px;
    padding:9px 15px;font-size:14px;font-weight:700}
  .sopt.on{background:linear-gradient(180deg,#2ff2d0,#159e85);color:#04241d;border-color:transparent}
  #seedIn{margin-top:6px;width:min(80vw,300px);padding:10px 14px;border-radius:11px;border:1px solid rgba(126,200,255,.25);
    background:rgba(8,14,30,.7);color:#eaf2ff;font-size:14px;text-align:center}
  .playbtn{margin-top:8px;cursor:pointer;background:linear-gradient(180deg,#ff7a3d,#e0561d);border:none;border-radius:30px;
    padding:15px 50px;color:#fff;font-weight:900;font-size:20px;box-shadow:0 6px 0 #b8420f}
  .playbtn:active{transform:translateY(3px);box-shadow:0 3px 0 #b8420f}
</style>

<div id="stage">
  <div class="bg" id="bg"></div>
  <div class="vig"></div>
  <div class="spot" id="spot" style="display:none"><div class="ring"></div><div class="pin">!</div></div>
  <div id="hsh"></div>
  <div id="hero"><canvas id="hcv" style="width:100%;aspect-ratio:240/324;display:none"></canvas><img id="himg" src="hero.png" alt="Torahachi" style="width:100%;display:block"></div>
  <div id="tag">トラはち</div>
  <div class="doorp" id="doorp">▲ 扉が開いた — 中央の扉へ進む</div>

    <h1>N/I <b>ESCAPE</b></h1>

    <div class="sgrp"><span class="slbl">難易度</span><div class="sopts" id="diffOpts"></div></div>
    <div class="sgrp"><span class="slbl">モード</span><div class="sopts" id="modeOpts"></div></div>

    <button class="playbtn" id="playBtn">▶ あそぶ</button>
  </div>
</div>

<script>
(function(){
  // 部屋(背景/名前/謎スポット位置)は固定、謎の中身はランで抽選
  var ROOMDEF=[
    {bg:'bg1.jpg',name:'機関室',spot:{x:72,d:.36}},
    {bg:'bg2.jpg',name:'制御室',spot:{x:28,d:.5}},
    {bg:'bg3.jpg',name:'医務室',spot:{x:70,d:.45}},
    {bg:'bg4.jpg',name:'コア室',spot:{x:50,d:.5}}
  ];
  var TOTAL=ROOMDEF.length, doneCount=0;
  var roomState=ROOMDEF.map(function(){return {done:false,puz:null};});

  // ---------- RNG(シード対応) ----------
  function makeRng(seed){ var h=1779033703^seed.length; for(var i=0;i<seed.length;i++){h=Math.imul(h^seed.charCodeAt(i),3432918353);h=h<<13|h>>>19;}
    var a=h>>>0; return function(){ a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  function ri2(rng,n){return Math.floor(rng()*n);}
  function pickR(rng,a){return a[ri2(rng,a.length)];}
  function shuf(rng,a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=ri2(rng,i+1),x=a[i];a[i]=a[j];a[j]=x;}return a;}
  var COLORS=[{n:'青',c:'#3aa0ff'},{n:'桃',c:'#ff5fa2'},{n:'緑',c:'#39e0a0'},{n:'黄',c:'#ffcc3a'},{n:'紫',c:'#9a7bff'},{n:'橙',c:'#ff8a3a'}];
  function chip(color,label){return '<span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:'+color+';color:#06121a;font-weight:800;margin:3px;font-size:15px">'+label+'</span>';}

  // 数字キーパッド(0-9)ヘルパー
  function pad(card,len,answer,hintHTML,onSolve){
    card.innerHTML=hintHTML+'<div class="read" id="rd"></div><div class="keys" id="ks"></div>';
    var code='',rd=card.querySelector('#rd'),ks=card.querySelector('#ks');
    function rr(){var a=code.split('');while(a.length<len)a.push('_');rd.textContent=a.join(' ');}
    function add(n){ if(code.length>=len)return; code+=n; rr();
      if(code.length===len){ if(code===answer){[].forEach.call(ks.querySelectorAll('.key'),function(k){k.classList.add('ok');});setTimeout(onSolve,350);}
        else setTimeout(function(){code='';rr();},420); } }
    for(var n=1;n<=9;n++){(function(n){var d=document.createElement('div');d.className='key';d.textContent=n;d.onclick=function(){add(''+n);};ks.appendChild(d);})(n);}
    var z=document.createElement('div');z.className='key';z.textContent='0';z.style.gridColumn='2';z.onclick=function(){add('0');};ks.appendChild(z);
    rr();
  }

  // ---------- パズルバンク(各 make(tier,rng)->{title,render(card,done)}) tier:1易/2普/3難 ----------
  var PUZZLES={
    keypad:{theme:'暗号',make:function(tier,rng){
      var len=tier===1?3:4, leg=shuf(rng,COLORS).slice(0,5).map(function(c){return {c:c.c,d:1+ri2(rng,9)};});
      var tgt=[];for(var i=0;i<len;i++)tgt.push(pickR(rng,leg));
      var base=tgt.map(function(t){return t.d;}).join(''), rule='', ans=base;
      if(tier===3){rule=' ルール:各+1';ans=base.split('').map(function(x){return (+x)%9+1;}).join('');}
      return {title:'暗号コードを解読',render:function(card,done){
        var hint='<h4>暗号コードを解読'+rule+'</h4><div style="font-size:11px;color:#9fb6d8;margin-bottom:4px">色＝数字</div>'
          +leg.map(function(l){return chip(l.c,l.d);}).join('')
          +'<div style="font-size:11px;color:#9fb6d8;margin:10px 0 4px">この順に読む</div>'+tgt.map(function(t){return chip(t.c,'');}).join('');
        pad(card,len,ans,hint,done);
      }};
    }},
    number:{theme:'暗号',make:function(tier,rng){
      var seq,ans,a;
      if(tier===1){a=2+ri2(rng,4);var k=2+ri2(rng,3);seq=[a,a+k,a+2*k,a+3*k];ans=a+4*k;}
      else if(tier===2){a=3+ri2(rng,5);var k2=4+ri2(rng,4);seq=[a,a+k2,a+2*k2,a+3*k2];ans=a+4*k2;}
      else {var x=1+ri2(rng,3),y=2+ri2(rng,3);seq=[x,y,x+y,x+2*y];ans=2*x+3*y;}
      return {title:'数列を解読',render:function(card,done){
        var hint='<h4>数列を解読</h4><div style="font-size:11px;color:#9fb6d8;margin-bottom:8px">次に来る数字は？</div>'
          +'<div style="font-size:24px;letter-spacing:.12em;color:#bdfff4;margin-bottom:6px">'+seq.join(' , ')+' , ?</div>';
        pad(card,String(ans).length,String(ans),hint,done);
      }};
    }},
    observe:{theme:'観察',make:function(tier,rng){
      var pal=shuf(rng,COLORS),tgt=pal[0],dis=pal.slice(1,tier===1?2:(tier===2?3:4));
      var total=tier===1?(6+ri2(rng,4)):(tier===2?(12+ri2(rng,5)):(16+ri2(rng,6)));
      var cnt=2+ri2(rng,tier===1?4:(tier===2?5:6)); if(cnt>=total)cnt=total-1;
      var dots=[];for(var i=0;i<cnt;i++)dots.push(tgt.c);for(var j=0;j<total-cnt;j++)dots.push(pickR(rng,dis).c);dots=shuf(rng,dots);
      var sz=tier===3?16:20;
      return {title:'数を数える',render:function(card,done){
        var grid=dots.map(function(c){return '<span style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c+';display:inline-block;margin:3px"></span>';}).join('');
        var hint='<h4>観察：数を数える</h4><div style="display:flex;flex-wrap:wrap;justify-content:center;max-width:300px;margin:0 auto 10px;padding:8px;background:rgba(0,0,0,.25);border-radius:10px">'+grid+'</div>'
          +'<div style="font-size:13px;color:#bdfff4;margin-bottom:6px">'+chip(tgt.c,'')+' は何個？</div>';
        pad(card,String(cnt).length,String(cnt),hint,done);
      }};
    }},
    wiring:{theme:'メカ',make:function(tier,rng){
      var n=tier===1?3:(tier===2?4:5),cols=shuf(rng,COLORS).slice(0,n).map(function(o){return o.c;}),left=shuf(rng,cols),right=shuf(rng,cols);
      return {title:'配線をつなぐ',render:function(card,done){
        card.innerHTML='<h4>配線：同じ色を結べ</h4><div id="wrap" style="display:flex;justify-content:center;gap:46px;padding:6px 10px"></div>';
        var wrap=card.querySelector('#wrap'),L=document.createElement('div'),R=document.createElement('div');
        L.style.cssText=R.style.cssText='display:flex;flex-direction:column;gap:11px';var sel=null,dc=0;
        function node(color,side){var d=document.createElement('div');d.style.cssText='width:40px;height:40px;border-radius:10px;background:'+color+';cursor:pointer;border:3px solid transparent;transition:.15s';
          d.onclick=function(){ if(d.dataset.done)return;
            if(side==='L'){ if(sel)sel.style.borderColor='transparent'; sel=d; d.style.borderColor='#fff'; }
            else if(sel){ if(sel.style.background===d.style.background){ sel.dataset.done=d.dataset.done='1'; sel.style.borderColor=d.style.borderColor='#7dffb0'; sel.style.opacity=d.style.opacity='.5'; sel=null; if(++dc===n)setTimeout(done,300); }
              else { var s=sel;d.style.borderColor='#ff5a5a';setTimeout(function(){d.style.borderColor='transparent';s.style.borderColor='transparent';},300);sel=null; } } };
          return d;}
        left.forEach(function(c){L.appendChild(node(c,'L'));});right.forEach(function(c){R.appendChild(node(c,'R'));});
        wrap.appendChild(L);wrap.appendChild(R);
      }};
    }},
    sequence:{theme:'メカ',make:function(tier,rng){
      var nb=tier===3?6:4,len=tier===1?3:(tier===2?4:5),memory=tier===3,pal=shuf(rng,COLORS).slice(0,nb).map(function(o){return o.c;});
      var seq=[];for(var i=0;i<len;i++)seq.push(ri2(rng,nb));
      return {title:'順番に押す',render:function(card,done){
        card.innerHTML='<h4>順番に押す'+(memory?'（記憶）':'')+'</h4><div id="ord" style="min-height:20px;margin-bottom:8px;font-size:12px;color:#9fb6d8"></div>'
          +'<div id="btns" style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap"></div><button class="act" id="pl" style="margin-top:12px">▶ 再生</button>';
        var btns=card.querySelector('#btns'),ord=card.querySelector('#ord'),pl=card.querySelector('#pl'),playing=false,input=[];
        var els=pal.map(function(c,i){var d=document.createElement('div');d.textContent=i+1;d.style.cssText='width:44px;height:44px;border-radius:12px;background:'+c+';opacity:.5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;color:#06121a;transition:.1s';btns.appendChild(d);return d;});
        function showOrd(){ ord.textContent= memory?'▶再生を見て覚える':('順番: '+seq.map(function(i){return i+1;}).join(' → ')); }
        function flash(i){els[i].style.opacity='1';els[i].style.transform='scale(1.12)';setTimeout(function(){els[i].style.opacity='.5';els[i].style.transform='none';},320);}
        pl.onclick=function(){if(playing)return;playing=true;input=[];var k=0;var iv=setInterval(function(){flash(seq[k]);k++;if(k>=seq.length){clearInterval(iv);playing=false;}},470);};
        els.forEach(function(d,i){d.onclick=function(){if(playing)return;flash(i);input.push(i);
          if(!input.every(function(v,j){return v===seq[j];})){input=[];ord.textContent='✗ もう一度';setTimeout(showOrd,700);return;}
          if(input.length===seq.length)setTimeout(done,250);};});
        showOrd();
      }};
    }}
  };
  var ALLIDS=Object.keys(PUZZLES);
  var DIFFS={easy:{label:'やさしい',curve:[1,1,2,2]},normal:{label:'ふつう',curve:[1,2,2,3]},hard:{label:'むずい',curve:[2,2,3,3]},expert:{label:'エキスパート',curve:[2,3,3,3]}};
  var MODES={any:{label:'おまかせ',ids:null},cipher:{label:'暗号系',ids:['keypad','number']},mech:{label:'メカ系',ids:['wiring','sequence']},obs:{label:'観察系',ids:['observe','sequence']}};
  var curDiff='normal',curMode='any',curSeed='';
  function makeRun(){
    var seed=curSeed||(''+Date.now()+Math.floor(Math.random()*1e6)); var rng=makeRng(seed);
    var ids=MODES[curMode].ids||ALLIDS, curve=DIFFS[curDiff].curve, prev='';
    for(var i=0;i<ROOMDEF.length;i++){ var cand=ids.filter(function(x){return x!==prev;}); if(!cand.length)cand=ids;
      var id=pickR(rng,cand); prev=id; roomState[i].done=false; roomState[i].puz=PUZZLES[id].make(curve[i],rng); }
    doneCount=0; objn.textContent='0 / '+TOTAL+' 完了';
  }
  var ri=0, px=50, pd=.5, face=1, t=0, locked=false;
  var BACKY=70, FRONTY=94, SB=.64, SF=1.16, BASEW=13.5; // perspective floor mapping（奥=床の終わり / 手前=さらに前へ）

  var bg=document.getElementById('bg'), hero=document.getElementById('hero'), hsh=document.getElementById('hsh'),
      tag=document.getElementById('tag'), spot=document.getElementById('spot'), doorp=document.getElementById('doorp'),
      ipr=document.getElementById('ipr'), here=document.getElementById('here'),
      objn=document.getElementById('objn'), modal=document.getElementById('modal'), card=document.getElementById('card'),
      H=()=>document.getElementById('stage').clientHeight, Wv=()=>document.getElementById('stage').clientWidth;

  function yFor(d){return BACKY+(FRONTY-BACKY)*d;}      // % from top of FEET
  function scFor(d){return SB+(SF-SB)*d;}
  function place(el,x,d,wPx,anchorBottom){ // x:% d:0..1
    var feetTopPct=yFor(d); el.style.left=x+'%'; el.style.top=feetTopPct+'%';
  }

  function loadRoom(){
    var r=ROOMDEF[ri], sp=r.spot, dn=roomState[ri].done;
    bg.style.backgroundImage='url("'+r.bg+'")';
    here.textContent=r.name;
    spot.style.display='block'; spot.classList.toggle('done',dn);
    spot.querySelector('.pin').textContent=dn?'✓':'!';
    spot.style.left=sp.x+'%'; spot.style.top=yFor(sp.d)+'%';
    spot.style.width=(74*scFor(sp.d))+'px'; spot.style.transform='translate(-50%,-50%)';
    drawMap();
  }
  function gotoRoom(n){
    if(n<0||n>=ROOMDEF.length)return; locked=true; bg.classList.remove('on'); doorp.classList.remove('show');
    setTimeout(function(){ ri=n; px=50; pd=.85; loadRoom(); bg.classList.add('on'); locked=false; },330); // 扉から入室→手前中央に登場
  }
  function win(){ locked=true; document.getElementById('win').style.display='flex'; }

  function drawMap(){
    var s=document.getElementById('mapsvg'),W=208,n=ROOMDEF.length,gap=W/n,r=12,y=30,h='';
    for(var i=0;i<n-1;i++){h+='<line x1="'+(gap*(i+0.5))+'" y1="'+y+'" x2="'+(gap*(i+1.5))+'" y2="'+y+'" stroke="rgba(126,200,255,.4)" stroke-width="3"/>';}
    for(var i=0;i<n;i++){var cx=gap*(i+0.5);var cur=i===ri;var dn=roomState[i].done;
      var col=cur?'#2ff2d0':(!dn?'rgba(255,216,106,.9)':'rgba(126,200,255,.5)');
      h+='<circle cx="'+cx+'" cy="'+y+'" r="'+r+'" fill="'+(cur?'rgba(47,242,208,.25)':'rgba(20,34,64,.8)')+'" stroke="'+col+'" stroke-width="'+(cur?3:2)+'"/>';
      h+='<text x="'+cx+'" y="'+(y+4)+'" text-anchor="middle" font-size="11" fill="'+col+'" font-family="sans-serif">'+(i+1)+'</text>';
      h+='<text x="'+cx+'" y="'+(y+24)+'" text-anchor="middle" font-size="8" fill="rgba(190,210,240,.75)" font-family="sans-serif">'+ROOMDEF[i].name+'</text>';}
    s.innerHTML=h;
  }

  function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},1600);}

  // ---- task modal: ランで割り当てたパズルを描画 ----
  function openTask(){
    var rs=roomState[ri]; if(!rs.puz||rs.done)return; modal.style.display='flex';
    rs.puz.render(card, finish);
    function finish(){ rs.done=true; doneCount++; objn.textContent=doneCount+' / '+TOTAL+' 完了';
      modal.style.display='none'; loadRoom(); toast('クリア！  '+doneCount+' / '+TOTAL); }
  }
  document.getElementById('mx').onclick=function(){modal.style.display='none';};
  document.getElementById('eb').onclick=function(){alert('緊急会議：本番では全員集合→議論→投票で1人を追放します');};

  // ---- input ----
  var keys={},dragV=null;
  addEventListener('keydown',function(e){var k=e.key;keys[k.toLowerCase()]=1;
    if(k.indexOf('Arrow')===0)e.preventDefault();
    if(k.toLowerCase()==='e')tryInteract();},{passive:false});
  addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=0;});
  var st=document.getElementById('stage');
  st.addEventListener('pointerdown',function(e){ if(modal.style.display==='flex')return; dragV={x:e.clientX,y:e.clientY,cx:e.clientX,cy:e.clientY};});
  st.addEventListener('pointermove',function(e){ if(dragV){dragV.cx=e.clientX;dragV.cy=e.clientY;} });
  addEventListener('pointerup',function(){dragV=null;});

  function near(){ var rs=roomState[ri],sp=ROOMDEF[ri].spot; if(!rs.puz||rs.done)return false; return Math.abs(px-sp.x)<7 && Math.abs(pd-sp.d)<.2; }
  function tryInteract(){ if(near())openTask(); }
  spot.parentNode.addEventListener('click',function(){ if(near())openTask(); });

  function frame(){
    t++; var mvx=0,mvz=0;
    if(!locked && modal.style.display!=='flex'){
      if(keys['arrowleft']||keys['a'])mvx=-1; if(keys['arrowright']||keys['d'])mvx=1;
      if(keys['arrowup']||keys['w'])mvz=-1; if(keys['arrowdown']||keys['s'])mvz=1;
      if(dragV){var dx=dragV.cx-dragV.x,dy=dragV.cy-dragV.y,l=Math.hypot(dx,dy); if(l>8){mvx=dx/Math.max(l,60);mvz=dy/Math.max(l,60);}}
    }
    if(mvx)face=mvx>0?1:-1;
    pd=Math.max(0,Math.min(1,pd+mvz*0.012));
    var xMin=34+(8-34)*pd, xMax=66+(92-66)*pd;   // 壁のパース: 奥=狭い / 手前=広い（台形）
    px=Math.max(xMin,Math.min(xMax,px+mvx*0.6));
    var moving=(mvx||mvz);

    // 中央の鍵付き扉: その部屋の謎を解くと開く → 奥中央の扉へ歩いて次の部屋へ
    var solved = roomState[ri].done;
    doorp.classList.toggle('show', solved && !locked);
    if(!locked && solved && Math.abs(px-50)<9 && pd<0.13){
      if(ri<ROOMDEF.length-1) gotoRoom(ri+1); else win();
    }

    // place hero with depth scale
    var sc=scFor(pd), wv=Wv(), hpx=BASEW*sc; // width in vw
    hero.style.width=hpx+'vw';
    var bob=moving?Math.abs(Math.sin(t*0.3))*9*sc:Math.sin(t*0.05)*3*sc;
    var feetTop=yFor(pd); // % from top where feet are
    hero.style.left=px+'%'; hero.style.top='calc('+feetTop+'% - '+(hero.offsetHeight)+'px - '+bob+'px)';
    var glbOn=(window.NIHERO&&window.NIHERO.ok&&window.NIHERO.ok());
    hero.style.transform='translateX(-50%) scaleX('+(glbOn?1:face)+')';
    if(window.NIHERO&&(mvx||mvz))window.NIHERO.setFace(Math.atan2(mvx,mvz));
    var shW=hpx*0.7;
    hsh.style.width=shW+'vw'; hsh.style.height=(shW*0.26)+'vw';
    hsh.style.left=px+'%'; hsh.style.top='calc('+feetTop+'% - '+(shW*0.13)+'vw'+(moving?' + 0px':'')+')';
    hsh.style.transform='translateX(-50%) scale('+(moving?0.92:1)+')';
    tag.style.left=px+'%'; tag.style.top='calc('+feetTop+'% - '+hero.offsetHeight+'px - '+bob+'px - 22px)';

    ipr.classList.toggle('show', near());
    requestAnimationFrame(frame);
  }

  // O2 timer（開始後に作動）
  var sec=300,clk=document.getElementById('clock'),timerStarted=false;
  function startTimer(){ if(timerStarted)return; timerStarted=true;
    setInterval(function(){if(sec>0)sec--;var m=Math.floor(sec/60),s=sec%60;clk.textContent=m+':'+(s<10?'0':'')+s;},1000); }

  // ---- スタート画面: 難易度＋モード選択 → ラン生成 → 開始 ----
  (function start(){
    var dOpts=document.getElementById('diffOpts'),mOpts=document.getElementById('modeOpts'),seedIn=document.getElementById('seedIn');
    function buildOpts(box,obj,getCur,setCur){ Object.keys(obj).forEach(function(k){var b=document.createElement('button');b.className='sopt';b.textContent=obj[k].label;
      b.onclick=function(){setCur(k);[].forEach.call(box.children,function(c){c.classList.remove('on');});b.classList.add('on');};
      if(k===getCur())b.classList.add('on'); box.appendChild(b);}); }
    buildOpts(dOpts,DIFFS,function(){return curDiff;},function(k){curDiff=k;});
    buildOpts(mOpts,MODES,function(){return curMode;},function(k){curMode=k;});
    document.getElementById('playBtn').onclick=function(){
      curSeed=(seedIn.value||'').trim(); makeRun();
      document.getElementById('start').style.display='none';
      ri=0; px=50; pd=.5; bg.classList.add('on'); loadRoom(); startTimer();
      if(!window.__loopOn){window.__loopOn=true; requestAnimationFrame(frame);}
    };
  })();
})();
</script>

<script type="module">
// ---- 3Dトラ(GLB)を2D背景に馴染ませて重ねる: トゥーン陰影 + ネオンのリムライト + 輪郭線 ----
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';
const cv=document.getElementById('hcv'), img=document.getElementById('himg');
function fallback(){ if(cv)cv.style.display='none'; if(img)img.style.display='block'; }
try{
  const renderer=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
  renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  const scene=new THREE.Scene();
  const FH=2.8; // フレーム高さ(ワールド)
  const cam=new THREE.OrthographicCamera(-1,1,FH,0,-10,10);
  function resize(){ const w=cv.clientWidth,h=cv.clientHeight; if(!w||!h)return;
    renderer.setSize(w,h,false); const a=w/h, HH=FH/2;
    cam.left=-HH*a; cam.right=HH*a; cam.top=HH; cam.bottom=-HH;
    cam.position.set(0,1.2,6); cam.lookAt(0,1.2,0); cam.updateProjectionMatrix(); }
  scene.add(new THREE.AmbientLight(0x8294b8,1.0));
  const key=new THREE.DirectionalLight(0xfff1e6,0.45); key.position.set(2,4,4); scene.add(key);
  const rimT=new THREE.DirectionalLight(0x2ff2d0,1.25); rimT.position.set(-3.5,2,-1.5); scene.add(rimT); // teal neon
  const rimM=new THREE.DirectionalLight(0xff3da0,1.0); rimM.position.set(3.5,1.2,-2); scene.add(rimM);   // magenta neon
  // トゥーン用グラデ(段階陰影)
  const grad=(function(){const c=document.createElement('canvas');c.width=4;c.height=1;const x=c.getContext('2d');
    const st=[96,150,205,255]; for(let i=0;i<4;i++){x.fillStyle='rgb('+st[i]+','+st[i]+','+st[i]+')';x.fillRect(i,0,1,1);}
    const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.minFilter=t.magFilter=THREE.NearestFilter; t.needsUpdate=true; return t;})();
  let model=null, ready=false, faceCur=0, faceTgt=0;
  const gl=new GLTFLoader(); const dr=new DRACOLoader();
  dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/'); gl.setDRACOLoader(dr);
  gl.load('hero.glb',function(g){
    model=g.scene;
    let box=new THREE.Box3().setFromObject(model), s=new THREE.Vector3(); box.getSize(s);
    model.scale.setScalar(2.4/(s.y||1));
    box=new THREE.Box3().setFromObject(model); const c2=box.getCenter(new THREE.Vector3());
    model.position.x-=c2.x; model.position.z-=c2.z; model.position.y-=box.min.y;
    var meshes=[]; model.traverse(function(o){ if(o.isMesh)meshes.push(o); }); // 先に集める(追加中の再帰防止)
    meshes.forEach(function(o){ const m=o.material;
      o.material=new THREE.MeshToonMaterial({map:(m&&m.map)||null,color:(m&&m.map)?0xffffff:((m&&m.color)||0xffffff),gradientMap:grad});
      const ol=new THREE.Mesh(o.geometry,new THREE.MeshBasicMaterial({color:0x0a0c14,side:THREE.BackSide}));
      ol.scale.multiplyScalar(1.06); o.add(ol);
    });
    scene.add(model); ready=true; cv.style.display='block'; if(img)img.style.display='none';
  }, undefined, function(){ fallback(); });
  window.NIHERO={ setFace:function(a){faceTgt=a;}, ok:function(){return ready;} };
  resize(); window.addEventListener('resize',resize);
  (function loop(){ try{ resize();
    if(model){ let d=faceTgt-faceCur; while(d>Math.PI)d-=6.283; while(d<-Math.PI)d+=6.283; faceCur+=d*0.18; model.rotation.y=faceCur; }
    renderer.render(scene,cam);
  }catch(e){} requestAnimationFrame(loop); })();
}catch(e){ fallback(); }
</script>
