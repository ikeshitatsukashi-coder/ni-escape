<!doctype html><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>N/I ESCAPE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#05070f;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,sans-serif;color:#eaf2ff;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #stage{position:fixed;inset:0;overflow:hidden}
  #bg{position:absolute;inset:0;background:#05070f center/cover no-repeat;
    background-image:url("bg.jpg");filter:saturate(1.06) brightness(.96)}
  .vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(125% 100% at 50% 40%,transparent 50%,rgba(2,4,10,.6) 100%)}
  .scan{position:absolute;inset:0;pointer-events:none;opacity:.06;
    background:repeating-linear-gradient(180deg,#fff 0 1px,transparent 1px 3px)}

  /* hero */
  #hero{position:absolute;left:50%;bottom:13%;width:13.5vw;min-width:150px;max-width:230px;z-index:4;
    transform:translateX(-50%);transition:none;will-change:transform}
  #hero img{width:100%;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55)) drop-shadow(0 0 16px rgba(47,242,208,.18))}
  #hsh{position:absolute;left:50%;bottom:12%;width:10vw;min-width:110px;max-width:170px;height:3.2vh;border-radius:50%;
    background:radial-gradient(closest-side,rgba(0,0,0,.6),transparent);z-index:3;transform:translateX(-50%)}
  #tag{position:absolute;left:50%;z-index:5;transform:translateX(-50%);
    background:rgba(8,14,32,.72);border:1px solid rgba(126,249,230,.45);color:#bdfff4;
    font-size:13px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}

  /* HUD */
  .hud{position:absolute;inset:0;z-index:10;pointer-events:none}
  .pan{position:absolute;background:rgba(10,17,36,.6);backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);
    border:1px solid rgba(126,200,255,.2);border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .logo{position:absolute;top:18px;left:20px;font-weight:800;letter-spacing:.14em;font-size:clamp(15px,1.5vw,19px);
    text-shadow:0 2px 10px rgba(0,0,0,.6)}
  .logo b{color:#2ff2d0}
  .timer{top:16px;right:152px;padding:7px 15px;font-weight:800;font-size:clamp(15px,1.5vw,19px);color:#ffd86a;
    font-variant-numeric:tabular-nums}
  .timer small{display:block;font-size:9px;letter-spacing:.2em;color:#9fb0d0}
  .eb{position:absolute;top:16px;right:20px;pointer-events:auto;cursor:pointer;
    background:linear-gradient(180deg,#ff4d7e,#d11d52);border:none;border-radius:13px;padding:11px 16px;
    color:#fff;font-weight:800;font-size:14px;box-shadow:0 8px 20px rgba(209,29,82,.45)}
  .eb:active{transform:scale(.96)}

  .tasks{top:74px;left:20px;width:min(60vw,256px);padding:14px 16px}
  .tasks h3{font-size:11px;letter-spacing:.24em;color:#7fe9d6;font-weight:800;margin-bottom:10px}
  .bar{height:7px;border-radius:6px;background:rgba(255,255,255,.1);overflow:hidden;margin-bottom:12px}
  .bar i{display:block;height:100%;width:40%;border-radius:6px;background:linear-gradient(90deg,#2ff2d0,#1ea3ff);
    box-shadow:0 0 12px rgba(47,242,208,.6);transition:width .4s}
  .t{display:flex;align-items:center;gap:10px;font-size:14px;padding:6px 0;color:#dbe6fb}
  .ck{width:19px;height:19px;border-radius:6px;flex:0 0 auto;border:1.5px solid rgba(126,200,255,.45);
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
  .ck.on{background:linear-gradient(180deg,#2ff2d0,#1aa98c);border-color:transparent;color:#04241d}
  .t.done{color:#7d8aa6;text-decoration:line-through}

  .puz{bottom:22px;right:22px;width:min(64vw,236px);padding:16px;pointer-events:auto}
  .puz h4{font-size:11px;letter-spacing:.2em;color:#ff9ec6;font-weight:800;margin-bottom:6px}
  .read{font-family:ui-monospace,monospace;font-size:28px;letter-spacing:.28em;color:#bdfff4;text-align:center;
    background:#05131a;border:1px solid rgba(47,242,208,.32);border-radius:9px;padding:7px 0;margin-bottom:12px;
    text-shadow:0 0 12px rgba(47,242,208,.5)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .key{aspect-ratio:1.5/1;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-size:18px;font-weight:800;color:#dbe6fb;background:linear-gradient(180deg,#1a2748,#10192f);
    border:1px solid rgba(126,200,255,.2)}
  .key:active{transform:scale(.94)}
  .key.ok{background:linear-gradient(180deg,#2ff2d0,#159e85);color:#04241d;border-color:transparent}

  .prompt{bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:9px;
    padding:9px 16px;font-size:14px}
  .kbd{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:6px;
    padding:2px 8px;font-weight:800;font-size:13px}

  .hint{position:absolute;bottom:7px;left:0;right:0;text-align:center;font-size:12px;color:#8aa0c8;z-index:11}
</style>

<div id="stage">
  <div id="bg"></div>
  <div id="hsh"></div>
  <div id="hero"><img src="hero.png" alt="Torahachi"></div>
  <div id="tag">トラはち</div>
  <div class="vig"></div><div class="scan"></div>

  <div class="hud">
    <div class="logo">N/I <b>ESCAPE</b></div>
    <div class="pan timer"><small>O2 REMAINING</small><span id="clock">04:38</span></div>
    <button class="eb" id="eb">⚠ 緊急会議</button>

    <div class="pan tasks">
      <h3 id="th">TASKS &nbsp; 2 / 5</h3>
      <div class="bar"><i id="bar"></i></div>
      <div class="t done"><span class="ck on">✓</span>電源を復旧する</div>
      <div class="t done"><span class="ck on">✓</span>カードキーを発見</div>
      <div class="t"><span class="ck"></span>配線を正しくつなぐ</div>
      <div class="t"><span class="ck"></span>暗号コードを解読</div>
      <div class="t"><span class="ck"></span>酸素ダクトを開放</div>
    </div>

    <div class="pan puz">
      <h4>SECURITY KEYPAD</h4>
      <div class="read" id="read">_ _ _ _</div>
      <div class="keys" id="keys"></div>
    </div>

    <div class="pan prompt"><span class="kbd">← →</span> 歩く ／ キーパッドを押す</div>
  </div>
  <div class="hint">これは試作画面です（矢印キーで歩けます／キーパッドを押せます）</div>
</div>

<script>
(function(){
  // ---- hero walk + idle bob ----
  var hero=document.getElementById('hero'), sh=document.getElementById('hsh'), tag=document.getElementById('tag');
  var x=50, face=1, t=0, moving=false, keys={};
  addEventListener('keydown',e=>{var k=e.key;keys[k]=1;if(k.indexOf('Arrow')===0){e.preventDefault();}},{passive:false});
  addEventListener('keyup',e=>keys[e.key]=0);
  function frame(){
    t+=1; var mv=0;
    if(keys['ArrowLeft']||keys['a']) mv=-1;
    if(keys['ArrowRight']||keys['d']) mv=1;
    moving = mv!==0;
    if(mv){ x=Math.max(16,Math.min(84,x+mv*0.55)); face=mv>0?1:-1; }
    var bob = moving ? Math.abs(Math.sin(t*0.32))*10 : Math.sin(t*0.06)*3;        // 歩行ホップ / 待機の呼吸
    var tilt = moving ? Math.sin(t*0.32)*3 : Math.sin(t*0.06)*1.2;
    hero.style.left=x+'vw';
    hero.style.transform='translateX(-50%) translateY(-'+bob+'px) rotate('+tilt+'deg) scaleX('+face+')';
    sh.style.left=x+'vw';
    sh.style.transform='translateX(-50%) scale('+(moving?0.92:1)+')';
    tag.style.left=x+'vw'; tag.style.bottom='calc(13% + '+(hero.offsetHeight+6)+'px)';
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- O2 timer countdown ----
  var sec=4*60+38, clock=document.getElementById('clock');
  setInterval(function(){ if(sec>0)sec--; var m=Math.floor(sec/60), s=sec%60;
    clock.textContent=m+':'+(s<10?'0':'')+s; }, 1000);

  // ---- keypad puzzle (enter 7 3 9 1) ----
  var code='', answer='7391', read=document.getElementById('read'), keysEl=document.getElementById('keys');
  var th=document.getElementById('th'), bar=document.getElementById('bar');
  for(var n=1;n<=9;n++){ (function(n){var d=document.createElement('div');d.className='key';d.textContent=n;
    d.onclick=function(){ if(code.length>=4)return; code+=n; render();
      if(code.length===4){ if(code===answer){ solved(); } else { setTimeout(function(){code='';render();},500); } } };
    keysEl.appendChild(d); })(n); }
  function render(){ var a=code.split(''); while(a.length<4)a.push('_'); read.textContent=a.join(' '); }
  function solved(){ read.textContent='✔ UNLOCK'; read.style.color='#7dffb0';
    [].forEach.call(keysEl.children,function(k){k.classList.add('ok');});
    th.textContent='TASKS   3 / 5'; bar.style.width='60%';
    document.querySelectorAll('.t')[3].classList.add('done');
    document.querySelectorAll('.t')[3].querySelector('.ck').classList.add('on');
    document.querySelectorAll('.t')[3].querySelector('.ck').textContent='✓'; }
  render();

  document.getElementById('eb').onclick=function(){ alert('緊急会議（本番では全員集合→議論→投票で追放）'); };
})();
</script>
